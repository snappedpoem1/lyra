# Lyra Oracle — Docker Services
# Runs: Prowlarr (indexer), rdtclient (Real-Debrid), slskd (Soulseek)
# Usage: docker-compose up -d
# Healthcheck: oracle doctor

services:

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: lyra_prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./data/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/health", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  rdtclient:
    image: rogerfar/rdtclient:2.0.86
    container_name: lyra_rdtclient
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./data/transport:/data/db
      - A:/Staging:/data/downloads
    ports:
      - "6500:6500"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6500", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qobuz:
    build:
      context: ./docker/qobuz
      dockerfile: Dockerfile
    container_name: lyra_qobuz
    environment:
      - QOBUZ_USERNAME=${QOBUZ_USERNAME}
      - QOBUZ_PASSWORD=${QOBUZ_PASSWORD}
      - QOBUZ_QUALITY=${QOBUZ_QUALITY:-7}
      - QOBUZ_MAX_WORKERS=3
      - STAGING_DIR=/app/staging
      - TZ=America/New_York
    volumes:
      - A:/Staging:/app/staging
    ports:
      - "7700:7700"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7700/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lyra_lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./data/lidarr:/config
      - A:/Staging:/downloads
    ports:
      - "8686:8686"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  essentia:
    build: ./docker/essentia
    container_name: lyra_essentia
    ports:
      - "7701:7701"
    volumes:
      - A:/Staging:/app/staging:ro
      - ${LIBRARY_BASE}:/app/library:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7701/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  slskd:
    image: slskd/slskd:0.21.3
    container_name: lyra_slskd
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_LISTEN_PORT=50300
    volumes:
      - ./data/node/data:/app/data
      - A:/Staging:/app/downloads
    ports:
      - "5030:5030"
      - "50300:50300"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "out=$$(wget -S -q -O /dev/null http://localhost:5030/api/v0/application 2>&1 || true); echo \"$$out\" | grep -Eq \"HTTP/1\\.[01] (200|401)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
