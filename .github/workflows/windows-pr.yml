name: Windows PR Gate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: windows-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/renderer-app/package-lock.json

      - name: Install renderer dependencies
        working-directory: desktop/renderer-app
        run: npm ci

      - name: Backend tests
        run: python -m pytest -q

      - name: Renderer tests
        working-directory: desktop/renderer-app
        run: npm run test:ci

      - name: Renderer build
        working-directory: desktop/renderer-app
        run: npm run build

      - name: Docs check
        run: powershell -ExecutionPolicy Bypass -File scripts/check_docs_state.ps1