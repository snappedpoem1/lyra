name: Windows Release Governance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
  release:
    types:
      - published

concurrency:
  group: windows-release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: desktop/renderer-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/renderer-app/src-tauri

      - name: Install renderer dependencies
        working-directory: desktop/renderer-app
        run: npm ci

      - name: Create bin resource placeholder
        run: New-Item -ItemType Directory -Force -Path desktop/renderer-app/src-tauri/bin/runtime/bin | Out-Null

      - name: Build Tauri debug host
        working-directory: desktop/renderer-app
        run: npm run tauri:build -- --debug

      - name: Install Cassette (NSIS silent)
        run: |
          $installer = Get-ChildItem "desktop/renderer-app/src-tauri/target/debug/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found under target/debug/bundle/nsis/" }
          Write-Host "Running installer: $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          $installedExe = "$env:LOCALAPPDATA\Programs\Cassette\Cassette.exe"
          if (-not (Test-Path $installedExe)) { throw "Installed exe not found after NSIS install: $installedExe" }
          Write-Host "Installed: $installedExe"

      - name: Validate installed layout
        run: powershell -ExecutionPolicy Bypass -File scripts/validate_installed_runtime.ps1 -InstalledRoot "$env:LOCALAPPDATA\Programs\Cassette" -SkipLaunchSmoke -HealthTimeoutSeconds 45

      - name: Packaged host smoke
        run: powershell -ExecutionPolicy Bypass -File scripts/packaged_host_smoke.ps1 -HealthTimeoutSeconds 45

      - name: Write build manifest
        run: powershell -ExecutionPolicy Bypass -File scripts/write_build_manifest.ps1 -OutputPath .lyra-build/manifests/windows-release-gate.json

      - name: Upload build governance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-gate-${{ github.run_number }}
          path: |
            .lyra-build/manifests/*.json
            desktop/renderer-app/src-tauri/target/debug/bundle/**
