# Beets configuration for MusicOracle
# BEETSDIR should point to this directory (C:\MusicOracle\.beets)

directory: "A:\\music\\Active Music"
library: "C:\\MusicOracle\\.beets\\beets_library.db"

# Import settings
import:
  move: yes
  write: yes
  autotag: yes
  quiet: yes
  duplicate_action: skip
  from_scratch: no
  detail: no
  log: "C:\\MusicOracle\\logs\\beets_import.log"

# Path templates
paths:
  default: "$albumartist/$album%aunique{}/%if{$disc,$disc-}$track $title"
  singleton: "$artist/Singles/$title"
  comp: "Compilations/$album%aunique{}/%if{$disc,$disc-}$track $title"
  albumtype:soundtrack: "Soundtracks/$album%aunique{}/%if{$disc,$disc-}$track $title"

# MusicBrainz matching thresholds
match:
  strong_rec_thresh: 0.10
  medium_rec_thresh: 0.25
  max_rec:
    missing_tracks: medium
    unmatched_tracks: medium

# No extra plugins for now (keep it simple)
plugins: []

# Windows-safe filename replacements
replace:
  '[\\]': _
  '[/]': _
  '[<]': _
  '[>]': _
  '[:]': _
  '["]': _
  '[?]': _
  '[*]': _
  '[|]': _
  '[\x00-\x1f]': _
  '\.$': _
  '\s+$': ''
  '^\s+': ''

# Disable color output (cleaner for log parsing)
ui:
  color: no
